      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.02); opacity: 0.9; }
    }
    .animate-pulse-slow {
      animation: pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

<body class="bg-background text-on-background selection:bg-secondary selection:text-on-secondary">
<!-- Immersive Canvas Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden px-container-margin">
<!-- Background Atmosphere -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-30">

</div>
<!-- Radial Glow Effect -->
<div class="absolute inset-0 z-0 pointer-events-none bg-[radial-gradient(circle_at_50%_50%,rgba(74,225,118,0.05)_0%,transparent_60%)]"></div>
<!-- Center Content Block -->
<div class="relative z-10 w-full max-w-md flex flex-col items-center text-center animate-pulse-slow">
<!-- Iconic Empty State Visual -->
<div class="mb-xl w-32 h-32 rounded-full flex items-center justify-center border-2 border-outline-variant bg-surface-container-low shadow-[0_0_40px_rgba(173,198,255,0.1)]">
<span class="material-symbols-outlined text-primary text-[64px]" style="font-variation-settings: 'FILL' 0, 'wght' 200;">
          fitness_center
        </span>
</div>
<!-- Core CTA: + ADD EXERCISE -->
<button class="group relative flex flex-col items-center justify-center w-full min-h-[200px] rounded-xl tactile-border bg-surface-container-high transition-all duration-300 hover:border-secondary hover:bg-surface-bright active:scale-95" onclick="this.classList.add('scale-95'); setTimeout(()=&gt;this.classList.remove('scale-95'), 100);">
<!-- Top row styling for the "plus" -->
<div class="w-16 h-16 rounded-full bg-secondary text-on-secondary flex items-center justify-center mb-md shadow-[0_0_20px_rgba(0,185,84,0.4)] group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[32px] font-bold">add</span>
</div>
<!-- Label String Exactly as Requested -->
<span class="font-display-lg text-headline-lg-mobile md:text-headline-lg text-on-surface uppercase tracking-tight glitch-hover">
          ADD EXERCISE
        </span>
<!-- Tertiary Support Text (Subtle Tone) -->
<span class="font-label-md text-label-md text-on-surface-variant mt-sm tracking-widest">
          START YOUR SESSION
        </span>
<!-- Interaction Highlight Overlay -->
<div class="absolute inset-0 rounded-xl bg-secondary opacity-0 group-hover:opacity-5 transition-opacity"></div>
</button><div class="mt-sm flex items-center gap-2 opacity-60">
  <span class="h-[1px] w-8 bg-outline-variant"></span>
  <span class="font-label-md text-label-md text-outline uppercase tracking-[0.2em]">ISOLATED SET PROTOCOL</span>
  <span class="h-[1px] w-8 bg-outline-variant"></span>
</div>
<!-- Minimalist Motivational Anchor -->
<p class="mt-xl font-body-md text-body-md text-outline italic opacity-60">A SIMPLE SYSTEM FOR PROGRESSIVE OVERLOAD</p>
</div>
<!-- Micro-Detail: Tactical Corners -->
<div class="absolute top-8 left-8 w-12 h-[1px] bg-outline-variant opacity-30"></div>
<div class="absolute top-8 left-8 h-12 w-[1px] bg-outline-variant opacity-30"></div>
<div class="absolute bottom-8 right-8 w-12 h-[1px] bg-outline-variant opacity-30"></div>
<div class="absolute bottom-8 right-8 h-12 w-[1px] bg-outline-variant opacity-30"></div>
<!-- Hidden Navigation Shell Logic: 
         Per Shared Components Logic: "The 'Destination' Rule: You are only permitted to render the BottomNavBar or SideNav if the current screen represents a top-level destination within the app's primary ecosystem.
         Automatic Suppression: You MUST exclude the navigation shell if the page intent is Task-Focused... or represents a temporary departure."
         
         Since this is an "Empty State" of a specific workout creation flow, we suppress the shell to prioritize the canvas as requested: "No headers, footers, or extra text — just the core brand aesthetic and the single starting action."
    -->
</main>
<script>
    // Lightweight interaction for the button hover glow tracking
    const btn = document.querySelector('button');
    btn.addEventListener('mousemove', (e) => {
      const rect = btn.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      btn.style.setProperty('--mouse-x', `${x}px`);
      btn.style.setProperty('--mouse-y', `${y}px`);
    });
  </script>
<style>
    /* CSS for localized glow effect on hover */
    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(173,198,255,0.08) 0%, transparent 80%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1;
    }
    button:hover::before {
      opacity: 1;
    }
  </style>
