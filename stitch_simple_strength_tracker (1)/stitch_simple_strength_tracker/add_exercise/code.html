<!DOCTYPE html><html class="dark" lang="en" style=""><head>
<meta charset="utf-8">

                        "surface": "#131313",

                        "on-secondary-fixed-variant": "#005321",
                        "on-primary-fixed": "#001a41",
                        "on-primary-fixed-variant": "#004493",
                        "on-tertiary": "#3c2f00",

                        "inverse-on-surface": "#313030",
                        "on-tertiary-fixed-variant": "#574500",
                        "on-secondary-fixed": "#002109",

                        "on-error": "#690005",

                        "on-background": "#e5e2e1",
                        "on-primary": "#002e69",
                        "primary-fixed-dim": "#adc6ff",
                        "outline-variant": "#414755",
                        "surface-container-lowest": "#0e0e0e",
                        "background": "#131313",
                        "on-secondary": "#003915",

                        "error": "#ffb4ab"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target": "48px",
                        "gutter": "16px",

                        "sm": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],

<style>
        body {
            background-color: #121212;
            color: #e5e2e1;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-input:focus ~ .kinetic-border {
            width: 100%;
        }
        .electric-glow {
            box-shadow: 0 0 20px rgba(74, 225, 118, 0.2);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
<!-- Main Canvas -->
<main class="flex-grow flex flex-col px-container-margin pt-xl pb-container-margin max-w-lg mx-auto w-full relative overflow-hidden">
<!-- Header Branding (Static) -->
<header class="mb-xl flex items-center justify-between">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-secondary tracking-widest uppercase">New Entry</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mt-1">Exercise Creation</h1>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface active:scale-90 transition-transform duration-150" onclick="window.history.back()">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Dynamic Content Area -->
<div class="flex-grow flex flex-col justify-center space-y-xl">
<!-- Bento-style Feature Card -->
<div class="relative group bg-surface-container rounded-xl p-md border border-outline-variant overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-secondary"></div>


<!-- Atmospheric background element -->
<div class="absolute -right-8 -bottom-8 opacity-5">
<span class="material-symbols-outlined text-[120px]" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
</div>
<!-- Kinetic Input Field -->
<div class="relative w-full group">
<label class="block font-label-md text-label-md text-outline uppercase mb-2 ml-1" for="exercise-name">Exercise Name</label>
<div class="relative">
<input class="w-full h-touch-target bg-surface-container-low border-b-2 border-outline-variant text-on-surface font-headline-lg-mobile text-headline-lg-mobile px-2 focus:outline-none focus:border-transparent transition-all placeholder:text-surface-variant kinetic-input" id="exercise-name" placeholder="e.g. Barbell Back Squat" type="text">
<div class="absolute bottom-0 left-0 h-0.5 w-0 bg-secondary transition-all duration-500 kinetic-border"></div>
</div>
<p class="mt-4 font-body-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">info</span>
                    Keep titles concise and descriptive.
                </p>
</div>
<!-- Tags Section (Micro-interaction) -->

</div>
<!-- Action Area (Sticky to bottom on mobile) -->
<footer class="mt-xl pt-lg">
<button class="w-full h-[64px] bg-secondary text-on-secondary-container font-headline-lg-mobile text-headline-lg-mobile uppercase rounded-xl flex items-center justify-center gap-3 active:scale-[0.98] transition-all duration-200 electric-glow"><span class="">ADD EXERCISE</span></button>

</footer>
</main>
<!-- Visual Polish: Noise/Grain Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay bg-[url('https://grainy-gradients.vercel.app/noise.svg')]"></div>
<script>
        // Micro-interaction for tag selection
        document.querySelectorAll('.flex.flex-wrap button').forEach(button => {
            button.addEventListener('click', () => {
                // Simplified toggle logic
                if(button.classList.contains('border-secondary')) {
                    button.classList.remove('border-secondary', 'bg-secondary/10', 'text-secondary');
                    button.classList.add('border-outline-variant');
                } else {
                    button.classList.add('border-secondary', 'bg-secondary/10', 'text-secondary');
                    button.classList.remove('border-outline-variant');
                }
            });
        });

        // Focus input on load
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('exercise-name').focus();
        });

        // Trigger action on Enter key
        document.getElementById('exercise-name').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const btn = document.querySelector('button.bg-secondary');
                btn.click();
            }
        });
    </script>


</body></html>
