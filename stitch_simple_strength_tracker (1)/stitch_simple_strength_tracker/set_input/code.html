                        "inverse-surface": "#e5e2e1",
                        "error": "#ffb4ab",

                        "tertiary-container": "#cea700",
                        "background": "#121212",

                        "on-secondary-container": "#004119",
                        "inverse-on-surface": "#313030",
                        "inverse-primary": "#005bc1",
                        "secondary-fixed-dim": "#4ae176",
                        "secondary": "#4ae176",
                        "primary-container": "#4b8eff",
                        "on-primary-container": "#00285c",

                        "on-primary-fixed": "#001a41",

<style>
        body {
            background-color: #121212;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .stepper-btn:active {
            transform: scale(0.9);
            background-color: #2C2C2C;
        }
        .log-btn-active:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .kinetic-border {
            border: 1px solid #3F3F46;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col justify-between overflow-hidden selection:bg-secondary selection:text-on-secondary-container">
<!-- Header & Title Area -->
<header class="pt-12 px-container-margin animate-fade-in-down">
<div class="flex justify-between items-center mb-sm">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Set 1 of 3</span>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs uppercase tracking-tight">Barbell Squat</h1>
<div class="inline-flex items-center gap-2 px-3 py-1 bg-surface-container rounded-full border border-outline-variant">
<span class="material-symbols-outlined text-secondary text-[18px]">target</span>
<span class="font-label-md text-label-md text-secondary uppercase">Goal: 10-15 Reps</span>
</div>
</header>
<!-- Main Input Grid -->
<main class="flex-grow flex flex-col justify-center px-container-margin gap-xl">
<!-- Weight Input Section -->
<section class="space-y-md">
<label class="font-label-md text-label-md text-on-surface-variant uppercase ml-1">Weight (LBS)</label>
<div class="flex items-center justify-between gap-gutter">
<button class="stepper-btn w-touch-target h-touch-target md:w-16 md:h-16 flex items-center justify-center kinetic-border rounded-xl bg-surface-container text-on-surface transition-all" onclick="decrement('weight')">
<span class="material-symbols-outlined text-[32px]">remove</span>
</button>
<div class="flex-grow kinetic-border rounded-xl bg-surface-container focus-within:border-secondary transition-colors h-24 md:h-32 flex items-center justify-center">
<input class="bg-transparent border-none focus:ring-0 text-center font-display-lg text-display-lg w-full text-on-surface" id="weight-input" type="number" value="135"/>
</div>
<button class="stepper-btn w-touch-target h-touch-target md:w-16 md:h-16 flex items-center justify-center kinetic-border rounded-xl bg-surface-container text-on-surface transition-all" onclick="increment('weight')">
<span class="material-symbols-outlined text-[32px]">add</span>
</button>
</div>
</section>
<!-- Reps Input Section -->
<section class="space-y-md">
<label class="font-label-md text-label-md text-on-surface-variant uppercase ml-1">Reps</label>
<div class="flex items-center justify-between gap-gutter">
<button class="stepper-btn w-touch-target h-touch-target md:w-16 md:h-16 flex items-center justify-center kinetic-border rounded-xl bg-surface-container text-on-surface transition-all" onclick="decrement('reps')">
<span class="material-symbols-outlined text-[32px]">remove</span>
</button>
<div class="flex-grow kinetic-border rounded-xl bg-surface-container focus-within:border-secondary transition-colors h-24 md:h-32 flex items-center justify-center">
<input class="bg-transparent border-none focus:ring-0 text-center font-display-lg text-display-lg w-full text-on-surface" id="reps-input" type="number" value="12"/>
</div>
<button class="stepper-btn w-touch-target h-touch-target md:w-16 md:h-16 flex items-center justify-center kinetic-border rounded-xl bg-surface-container text-on-surface transition-all" onclick="increment('reps')">
<span class="material-symbols-outlined text-[32px]">add</span>
</button>
</div>
</section>
</main>
<!-- Footer Action -->
<footer class="p-container-margin pb-12">
<button class="log-btn-active w-full h-[64px] bg-secondary text-on-secondary-container font-label-md text-label-md uppercase tracking-widest rounded-xl shadow-[0_8px_32px_rgba(74,225,118,0.2)] flex items-center justify-center gap-2 transition-all group overflow-hidden relative">
<span class="relative z-10">Log Set</span>
<span class="material-symbols-outlined relative z-10 group-hover:translate-x-1 transition-transform">chevron_right</span>
<!-- Subtle light effect -->
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</footer>
<script>
        function increment(type) {
            const input = document.getElementById(type + '-input');
            const step = type === 'weight' ? 5 : 1;
            input.value = parseInt(input.value) + step;
            triggerHaptic();
        }

        function decrement(type) {
            const input = document.getElementById(type + '-input');
            const step = type === 'weight' ? 5 : 1;
            const newVal = parseInt(input.value) - step;
            if (newVal >= 0) {
                input.value = newVal;
                triggerHaptic();
            }
        }

        function triggerHaptic() {
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(5);
            }
        }

        // Add visual flair to the background
        const body = document.body;
        body.addEventListener('touchstart', (e) => {
            const circle = document.createElement('div');
            circle.className = 'absolute pointer-events-none w-1 h-1 bg-secondary rounded-full opacity-20 transform -translate-x-1/2 -translate-y-1/2 animate-ping';
            circle.style.left = e.touches[0].clientX + 'px';
            circle.style.top = e.touches[0].clientY + 'px';
            body.appendChild(circle);
            setTimeout(() => circle.remove(), 600);
        });
    </script>
<style>
        @keyframes fade-in-down {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down {
            animation: fade-in-down 0.6s ease-out forwards;
        }
    </style>
</body></html>
